services:
  - type: web
    name: wood-natural-planer
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: PLANNER_DB_PATH
        value: /opt/render/project/src/data/planner.db
    disk:
      name: planner-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

